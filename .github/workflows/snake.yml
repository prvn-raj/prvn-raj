name: Generate Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install snake generator
        run: npm install @snk/cli

      - name: Generate contribution snakes
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        run: |
          mkdir -p dist
          npx snk generate \
            --user prvn-raj \
            --github-token "$GITHUB_TOKEN" \
            --output dist/github-contribution-grid-snake.svg

          npx snk generate \
            --user prvn-raj \
            --github-token "$GITHUB_TOKEN" \
            --palette github-dark \
            --output dist/github-contribution-grid-snake-dark.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
